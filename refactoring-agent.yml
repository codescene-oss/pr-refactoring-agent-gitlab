# GitLab CI Template for Refactoring Agent
# Include in your .gitlab-ci.yml:
#   include:
#     - remote: 'https://raw.githubusercontent.com/codescene-oss/pr-refactoring-agent/main/gitlab/refactoring-agent.yml'
#
# Usage:
#   Comment on MR: /run-pipeline COMMAND="skill:fix-code-health-degradations improve complexity"

.refactoring-agent-base:
  image: ubuntu:latest
  before_script:
    # Install dependencies
    - apt-get update -qq && apt-get install -y -qq curl unzip jq git

    # Detect platform
    - |
      OS="$(uname -s)"
      ARCH="$(uname -m)"

      case "$OS-$ARCH" in
        Linux-x86_64|Linux-amd64)
          BINARY_NAME="refactoring-agent-linux-amd64"
          ;;
        Linux-aarch64|Linux-arm64)
          BINARY_NAME="refactoring-agent-linux-aarch64"
          ;;
        *)
          echo "Unsupported platform: $OS-$ARCH"
          echo "Supported platforms: Linux x86_64, Linux aarch64"
          exit 1
          ;;
      esac

    # Download binary from GitHub Releases
    - |
      VERSION="${REFACTORING_AGENT_VERSION:-latest}"
      REPO="codescene-oss/refactoring-agent-releases"
      ASSET_NAME="${BINARY_NAME}.zip"

      if [ -n "${GITHUB_RELEASES_TOKEN}" ]; then
        # Token provided - use API method (for private repos)
        echo "Using GitHub API to download binary..."

        # Get the release
        if [ "$VERSION" = "latest" ]; then
          RELEASE_DATA=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_RELEASES_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/latest")
        else
          RELEASE_DATA=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_RELEASES_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/tags/${VERSION}")
        fi

        RELEASE_TAG=$(echo "$RELEASE_DATA" | jq -r '.tag_name')
        echo "Release tag: $RELEASE_TAG"

        # Find the asset ID
        ASSET_ID=$(echo "$RELEASE_DATA" | jq -r ".assets[] | select(.name == \"${ASSET_NAME}\") | .id")

        if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" = "null" ]; then
          echo "Error: Could not find ${ASSET_NAME} in release ${RELEASE_TAG}"
          echo "Available assets:"
          echo "$RELEASE_DATA" | jq -r '.assets[].name'
          exit 1
        fi

        echo "Downloading ${ASSET_NAME} (asset ID: ${ASSET_ID})..."

        # Download via API
        if ! curl -fsSL -H "Authorization: Bearer ${GITHUB_RELEASES_TOKEN}" \
          -H "Accept: application/octet-stream" \
          -o "${BINARY_NAME}.zip" \
          "https://api.github.com/repos/${REPO}/releases/assets/${ASSET_ID}"; then
          echo "Error: Failed to download binary"
          exit 1
        fi

        echo "✅ Successfully downloaded ${ASSET_NAME}"
      else
        # No token - use direct download (public repos only)
        if [ "$VERSION" = "latest" ]; then
          DOWNLOAD_URL="https://github.com/${REPO}/releases/latest/download/${ASSET_NAME}"
        else
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${VERSION}/${ASSET_NAME}"
        fi

        echo "Using direct download from ${DOWNLOAD_URL}..."

        if ! curl -fsSL -o "${BINARY_NAME}.zip" "$DOWNLOAD_URL"; then
          echo "Error: Failed to download binary from GitHub Releases"
          echo "URL: ${DOWNLOAD_URL}"
          echo "If the releases repo is private, you must provide GITHUB_RELEASES_TOKEN"
          exit 1
        fi

        echo "✅ Successfully downloaded ${ASSET_NAME}"
      fi

      unzip -q "${BINARY_NAME}.zip"
      chmod +x "${BINARY_NAME}"
      mv "${BINARY_NAME}" /usr/local/bin/refactoring-agent

      echo "Binary installed successfully"
      refactoring-agent --version || echo "Binary installed at /usr/local/bin/refactoring-agent"

    # Configure git
    - git config user.name "${GITLAB_USER_NAME:-gitlab-ci[bot]}"
    - git config user.email "${GITLAB_USER_EMAIL:-gitlab-ci[bot]@noreply.gitlab.com}"

  script:
    # Validate required variables are set
    - |
      if [ -z "$COMMAND" ]; then
        echo "Error: COMMAND variable not set"
        echo ""
        echo "Usage: Comment on MR with:"
        echo "  /run-pipeline COMMAND=\"skill:fix-code-health-degradations improve complexity\""
        echo ""
        echo "Examples:"
        echo "  /run-pipeline COMMAND=\"skill:fix-code-health-degradations improve complexity\""
        echo "  /run-pipeline COMMAND=\"skill:uplift-code-health improve readability\""
        echo "  /run-pipeline COMMAND=\"skill:fix-code-health-degradations skill:uplift-code-health improve all\""
        exit 1
      fi

      if [ -z "$MODEL" ]; then
        echo "Error: MODEL variable not set"
        exit 1
      fi

      echo "Command: ${COMMAND}"

    # Build CS_AGENT_CONFIG JSON
    - |
      CS_AGENT_CONFIG=$(jq -n \
        --arg token "${CS_ACCESS_TOKEN}" \
        --arg gl_token "${GITLAB_TOKEN}" \
        --arg project_id "${CI_PROJECT_ID}" \
        --arg mr_iid "${CI_MERGE_REQUEST_IID:-}" \
        --arg api_url "${CI_API_V4_URL:-https://gitlab.com/api/v4}" \
        --arg anthropic_key "${ANTHROPIC_API_KEY:-}" \
        --arg openai_key "${OPENAI_API_KEY:-}" \
        --arg google_key "${GOOGLE_API_KEY:-}" \
        --arg opencode_auth "${OPENCODE_AUTH_JSON:-}" \
        '{
          codescene_access_token: $token,
          tracking: { environment: "gitlab-ci" },
          provider: ({}
            + (if $anthropic_key != "" then { anthropic_api_key: $anthropic_key } else {} end)
            + (if $openai_key != "" then { openai_api_key: $openai_key } else {} end)
            + (if $google_key != "" then { google_api_key: $google_key } else {} end)
            + (if $opencode_auth != "" then { opencode_auth_json: $opencode_auth } else {} end))
        }
        + (if $mr_iid != "" then {
            ci: {
              gitlab: {
                token: $gl_token,
                project_id: $project_id,
                mr_iid: $mr_iid,
                api_url: $api_url
              }
            }
          } else {} end)')
      export CS_AGENT_CONFIG

    # Prepend gitlab-mr-comment if in MR context
    - |
      if [ -n "${CI_MERGE_REQUEST_IID}" ]; then
        export MR_IID="${CI_MERGE_REQUEST_IID}"
        FULL_COMMAND="skill:gitlab-mr-comment ${COMMAND}"
        echo "MR context detected, prepending gitlab-mr-comment skill"
      else
        FULL_COMMAND="${COMMAND}"
        echo "No MR context, running without gitlab-mr-comment skill"
      fi

      echo "Full command: ${FULL_COMMAND}"

    # Set authenticated remote URL so the agent can push
    - git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

    # Run refactoring agent
    - |
      echo "Running refactoring agent..."
      refactoring-agent run "$FULL_COMMAND" \
        --model "$MODEL" \
        --push

